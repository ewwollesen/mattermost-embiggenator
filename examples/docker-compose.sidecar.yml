services:
  openldap:
    image: ghcr.io/rroemhild/docker-test-openldap:master
    ports:
      - "10389:10389"
      - "10636:10636"

  embiggenator:
    build: ..
    depends_on:
      - openldap
    command: >
      populate
        --host openldap
        --port 10389
        -u 500
        -g 20
        -m 10-50
